apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-health
  namespace: supportops-platform
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-health
  namespace: supportops-platform
  labels:
    app.kubernetes.io/name: platform-health
    app.kubernetes.io/part-of: supportops-ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-health
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-health
        app.kubernetes.io/part-of: supportops-ai-platform
    spec:
      serviceAccountName: platform-health
      automountServiceAccountToken: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform-health
          image: localhost:5001/supportops/platform-health:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: platform-health
  namespace: supportops-platform
spec:
  selector:
    app.kubernetes.io/name: platform-health
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-health
  namespace: supportops-platform
spec:
  ingressClassName: nginx
  rules:
    - host: platform.supportops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-health
                port:
                  name: http
