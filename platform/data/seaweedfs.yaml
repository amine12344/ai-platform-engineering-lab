apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: supportops-data
  labels:
    app.kubernetes.io/name: seaweedfs
spec:
  selector:
    app.kubernetes.io/name: seaweedfs
  ports:
    - name: master
      port: 9333
    - name: filer
      port: 8888
    - name: s3
      port: 8333
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: supportops-data
spec:
  serviceName: seaweedfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
        supportops.io/component: object-storage
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.29
          imagePullPolicy: IfNotPresent
          args:
            - server
            - -dir=/data
            - -s3
            - -s3.port=8333
            - -s3.config=/etc/seaweedfs/s3.json
          ports:
            - name: master
              containerPort: 9333
            - name: filer
              containerPort: 8888
            - name: s3
              containerPort: 8333
          readinessProbe:
            httpGet:
              path: /
              port: master
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: s3-credentials
              mountPath: /etc/seaweedfs
              readOnly: true
      volumes:
        - name: s3-credentials
          secret:
            secretName: seaweedfs-s3-credentials
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seaweedfs-s3
  namespace: supportops-data
spec:
  ingressClassName: nginx
  rules:
    - host: s3.supportops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seaweedfs
                port:
                  name: s3
